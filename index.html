<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>JJS v0.2 Lite</title>

<style>
html,body{
margin:0;
overflow:hidden;
background:#111;
font-family:Arial;
}

#menu{
position:absolute;
inset:0;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
background:#111;
color:white;
z-index:10;
}

button,input{
padding:10px;
margin:5px;
font-size:18px;
}
</style>
</head>

<body>

<div id="menu">
<h1>JJS v0.2 Lite</h1>

<input id="username" placeholder="Username">

<button id="playBtn">
Play
</button>
</div>

<script>
document.getElementById("playBtn").onclick=()=>{

const name =
document.getElementById("username").value;

if(!name){
alert("Enter username");
return;
}

alert("Welcome " + name);

};
</script>

</body>
</html>
