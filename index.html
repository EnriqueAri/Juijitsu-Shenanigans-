<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>JJS Prototype+</title>
<style>
html,body{margin:0;height:100%;overflow:hidden;background:#111;font-family:Arial}
#menu,#characterMenu{
position:absolute;inset:0;display:flex;flex-direction:column;
justify-content:center;align-items:center;color:white;background:#111;z-index:10;
}
#characterMenu{display:none;}
button,input{padding:10px;margin:6px;font-size:18px}
#hud{position:absolute;top:10px;left:10px;color:white;display:none;z-index:5}
#moves{position:absolute;bottom:10px;left:10px;color:white;display:none;z-index:5}
</style>
</head>
<body>

<div id="menu">
<h1>JJS Prototype+</h1>
<input id="username" placeholder="Username">
<button id="playBtn">Play</button>
</div>

<div id="characterMenu">
<h2>Select Fighter</h2>
<select id="fighter">
<option>Azure Sorcerer</option>
<option>Shadow Summoner</option>
<option>Hammer Witch</option>
<option>Lucky Brawler</option>
<option>Crimson King</option>
<option>Storm Monk</option>
<option>Void Walker</option>
<option>Iron Guardian</option>
<option>Blaze Hunter</option>
<option>Moon Duelist</option>
</select>
<button id="startBtn">Enter City</button>
</div>

<div id="hud">
<div id="playerName"></div>
<div>HP: <span id="hp">100</span></div>
<div>Character: <span id="charName"></span></div>
</div>

<div id="moves">
1-4 = Abilities<br>
G = Domain Expansion<br>
Shift = Dash<br>
Left Click = Punch
</div>

<script type="module">
import * as THREE from "https://unpkg.com/three@0.165.0/build/three.module.js";

let hp=100;
let username="";
let fighter="";

const scene=new THREE.Scene();
scene.background=new THREE.Color(0x202020);

const camera=new THREE.PerspectiveCamera(75,innerWidth/innerHeight,0.1,1000);

const renderer=new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth,innerHeight);
document.body.appendChild(renderer.domElement);

scene.add(new THREE.AmbientLight(0xffffff,0.8));

const light=new THREE.DirectionalLight(0xffffff,2);
light.position.set(20,30,20);
scene.add(light);

const ground=new THREE.Mesh(
new THREE.PlaneGeometry(300,300),
new THREE.MeshStandardMaterial({color:0x444444})
);
ground.rotation.x=-Math.PI/2;
scene.add(ground);

const player=new THREE.Mesh(
new THREE.BoxGeometry(1,2,1),
new THREE.MeshStandardMaterial({color:0x00aaff})
);
player.position.y=1;
scene.add(player);

for(let x=-80;x<=80;x+=12){
 for(let z=-80;z<=80;z+=12){
   if(Math.random()<0.7){
      const h=5+Math.random()*30;
      const b=new THREE.Mesh(
      new THREE.BoxGeometry(6,h,6),
      new THREE.MeshStandardMaterial({color:0x666666})
      );
      b.position.set(x,h/2,z);
      scene.add(b);
   }
 }
}

const keys={};
let yaw=0;
let dash=0;
let velY=0;
let grounded=true;
let combo=0;

const projectiles = [];

function createBlue(){

    const blue = new THREE.Mesh(
        new THREE.SphereGeometry(1,16,16),
        new THREE.MeshStandardMaterial({
            color:0x0000ff,
            emissive:0x0000ff
        })
    );

    blue.position.copy(player.position);
    blue.position.y += 1.5;

    scene.add(blue);

    projectiles.push({
        mesh: blue,
        velocity: new THREE.Vector3(
            -Math.sin(yaw),
            0,
            -Math.cos(yaw)
        ).multiplyScalar(0.8)
    });
}

function createRed(){

    const red = new THREE.Mesh(
        new THREE.SphereGeometry(1.2,16,16),
        new THREE.MeshStandardMaterial({
            color:0xff0000,
            emissive:0xff0000
        })
    );

    red.position.copy(player.position);
    red.position.y += 1.5;

    scene.add(red);

    projectiles.push({
        mesh: red,
        velocity: new THREE.Vector3(
            -Math.sin(yaw),
            0,
            -Math.cos(yaw)
        ).multiplyScalar(1.2)
    });
}

function createPurple(){

    const purple = new THREE.Mesh(
        new THREE.SphereGeometry(2,24,24),
        new THREE.MeshStandardMaterial({
            color:0xaa00ff,
            emissive:0xaa00ff
        })
    );

    purple.position.copy(player.position);
    purple.position.y += 1.5;

    scene.add(purple);

    projectiles.push({
        mesh: purple,
        velocity: new THREE.Vector3(
            -Math.sin(yaw),
            0,
            -Math.cos(yaw)
        ).multiplyScalar(1.8)
    });
}

function domainExpansion(){

    const domain = new THREE.Mesh(
        new THREE.SphereGeometry(40,32,32),
        new THREE.MeshBasicMaterial({
            color:0x5500ff,
            wireframe:true
        })
    );

    domain.position.copy(player.position);

    scene.add(domain);

    setTimeout(()=>{
        scene.remove(domain);
    },10000);
}

addEventListener("keydown",e=>{

    keys[e.key.toLowerCase()] = true;

    if(fighter !== "Azure Sorcerer")
        return;

    if(e.key === "1")
        createBlue();

    if(e.key === "2")
        createRed();

    if(e.key === "3")
        createPurple();

    if(e.key.toLowerCase() === "g")
        domainExpansion();
});

document.getElementById("playBtn").onclick=()=>{
 const n=document.getElementById("username").value.trim();
 if(!n)return;
 username=n;
 document.getElementById("menu").style.display="none";
 document.getElementById("characterMenu").style.display="flex";
};

document.getElementById("startBtn").onclick=()=>{
 fighter=document.getElementById("fighter").value;
 document.getElementById("characterMenu").style.display="none";
 document.getElementById("hud").style.display="block";
 document.getElementById("moves").style.display="block";
 document.getElementById("playerName").innerText=username;
 document.getElementById("charName").innerText=fighter;
};

addEventListener("click",()=>{
 if(document.pointerLockElement!==document.body){
  document.body.requestPointerLock();
 }else{
  combo=(combo%4)+1;
  console.log("Punch combo",combo);
 }
});

addEventListener("mousemove",e=>{
 if(document.pointerLockElement===document.body){
  yaw-=e.movementX*0.002;
 }
});

function loop(){
 requestAnimationFrame(loop);

 let speed=0.15;

 if(keys["shift"]&&dash<=0){
   speed=0.5;
   dash=20;
 }

 if(dash>0)dash--;

 const forward=new THREE.Vector3(Math.sin(yaw),0,Math.cos(yaw));
 const right=new THREE.Vector3(Math.cos(yaw),0,-Math.sin(yaw));

 if(keys["w"])player.position.add(forward.clone().multiplyScalar(-speed));
 if(keys["s"])player.position.add(forward.clone().multiplyScalar(speed));
 if(keys["a"])player.position.add(right.clone().multiplyScalar(-speed));
 if(keys["d"])player.position.add(right.clone().multiplyScalar(speed));

 if(keys[" "]&&grounded){
  velY=0.35;
  grounded=false;
 }

 velY-=0.02;
 player.position.y+=velY;

 if(player.position.y<=1){
  player.position.y=1;
  velY=0;
  grounded=true;
 }

 camera.position.set(
 player.position.x+Math.sin(yaw)*8,
 player.position.y+5,
 player.position.z+Math.cos(yaw)*8
 );

 camera.lookAt(player.position);

 document.getElementById("hp").innerText=hp;
for(let i=projectiles.length-1;i>=0;i--){

    projectiles[i].mesh.position.add(
        projectiles[i].velocity
    );

    if(
        projectiles[i].mesh.position.length()
        > 300
    ){
        scene.remove(projectiles[i].mesh);
        projectiles.splice(i,1);
    }
}
 renderer.render(scene,camera);
}
loop();
</script>
</body>
</html>
