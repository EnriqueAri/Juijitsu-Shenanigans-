<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>JJS</title>

<style>
html,body{
    margin:0;
    overflow:hidden;
    width:100%;
    height:100%;
    background:black;
    font-family:Arial;
}

#menu{
    position:absolute;
    width:100%;
    height:100%;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    background:black;
    color:white;
    z-index:1000;
}

#username{
    padding:10px;
    font-size:20px;
    width:250px;
    margin:10px;
}

#playBtn{
    padding:10px 20px;
    font-size:20px;
    cursor:pointer;
}

#hud{
    position:absolute;
    top:10px;
    left:10px;
    color:white;
    display:none;
    z-index:100;
}

#crosshair{
    position:absolute;
    left:50%;
    top:50%;
    transform:translate(-50%,-50%);
    color:white;
    font-size:24px;
    display:none;
}
</style>
</head>

<body>

<div id="menu">
    <h1>JJS</h1>
    <input id="username" placeholder="Enter Username">
    <button id="playBtn">Play</button>
</div>

<div id="hud">
    <div id="playerName"></div>
    <div>HP: <span id="hp">100</span></div>
</div>

<div id="crosshair">+</div>

<script type="module">

import * as THREE from 'https://unpkg.com/three@0.165.0/build/three.module.js';

let username = "";

let socket = null;
let myId = null;
const remotePlayers = {};

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x222222);

const camera = new THREE.PerspectiveCamera(
75,
window.innerWidth/window.innerHeight,
0.1,
1000
);

const renderer = new THREE.WebGLRenderer();
renderer.setSize(window.innerWidth,window.innerHeight);
document.body.appendChild(renderer.domElement);

const light = new THREE.DirectionalLight(0xffffff,2);
light.position.set(10,20,10);
scene.add(light);

const ambient = new THREE.AmbientLight(0xffffff,0.5);
scene.add(ambient);

const ground = new THREE.Mesh(
    new THREE.PlaneGeometry(200,200),
    new THREE.MeshStandardMaterial({color:0x444444})
);

ground.rotation.x = -Math.PI/2;
scene.add(ground);

const player = new THREE.Mesh(
    new THREE.BoxGeometry(1,2,1),
    new THREE.MeshStandardMaterial({color:0x00aaff})
);

player.position.y = 1;
scene.add(player);

for(let i=0;i<60;i++){

    const height = Math.random()*25+5;

    const building = new THREE.Mesh(
        new THREE.BoxGeometry(5,height,5),
        new THREE.MeshStandardMaterial({
            color:0x666666
        })
    );

    building.position.set(
        (Math.random()-0.5)*180,
        height/2,
        (Math.random()-0.5)*180
    );

    scene.add(building);
}

let hp = 100;
let dashCooldown = 0;
let verticalVelocity = 0;
let grounded = true;

const keys = {};

window.addEventListener(
'keydown',
e=>keys[e.key.toLowerCase()] = true
);

window.addEventListener(
'keyup',
e=>keys[e.key.toLowerCase()] = false
);

document.getElementById("playBtn")
.onclick = () => {

    const value =
    document.getElementById("username")
    .value
    .trim();

    if(!value) return;

    username = value;

    document.getElementById("menu")
    .style.display = "none";

    document.getElementById("hud")
    .style.display = "block";

    document.getElementById("crosshair")
    .style.display = "block";

    document.getElementById("playerName")
    .innerText = username;
    socket = new WebSocket(
        console.log("Attempting connection...");
    "wss://juijitsu-shenanigans-production.up.railway.app"
);

socket.onopen = () => {
    console.log("Connected to server");
};

socket.onmessage = (event) => {

    const data = JSON.parse(event.data);

    if(data.type === "init"){
        myId = data.id;
        console.log("My ID:", myId);
    }

    if(data.type === "players"){
        console.log("Players:", data.players);
    }
};

socket.onerror = (err) => {
    console.error("Socket Error", err);
};

socket.onclose = () => {
    console.log("Disconnected");
};
};

window.addEventListener("click",()=>{

    if(document.pointerLockElement
    !== document.body){

        document.body.requestPointerLock();
    }

});

let yaw = 0;
let pitch = 20;

document.addEventListener(
"mousemove",
e=>{

    if(document.pointerLockElement
    === document.body){

        yaw -= e.movementX * 0.002;
        pitch -= e.movementY * 0.002;

        pitch =
        Math.max(
            -1.2,
            Math.min(1.2,pitch)
        );
    }
});

function animate(){

    requestAnimationFrame(animate);

    let speed = 0.15;

    if(keys["shift"] && dashCooldown <= 0){
        speed = 0.5;
        dashCooldown = 20;
    }

    if(dashCooldown > 0)
        dashCooldown--;

    const forward =
    new THREE.Vector3(
        Math.sin(yaw),
        0,
        Math.cos(yaw)
    );

    const right =
    new THREE.Vector3(
        Math.cos(yaw),
        0,
        -Math.sin(yaw)
    );

    if(keys["w"])
        player.position.add(
            forward.clone().multiplyScalar(-speed)
        );

    if(keys["s"])
        player.position.add(
            forward.clone().multiplyScalar(speed)
        );

    if(keys["a"])
        player.position.add(
            right.clone().multiplyScalar(-speed)
        );

    if(keys["d"])
        player.position.add(
            right.clone().multiplyScalar(speed)
        );

    if(keys[" "] && grounded){

        verticalVelocity = 0.35;
        grounded = false;
    }

    verticalVelocity -= 0.02;

    player.position.y += verticalVelocity;

    if(player.position.y <= 1){

        player.position.y = 1;
        grounded = true;
        verticalVelocity = 0;
    }

    camera.position.set(
        player.position.x +
        Math.sin(yaw)*8,

        player.position.y + 5,

        player.position.z +
        Math.cos(yaw)*8
    );

    camera.lookAt(player.position);

    document.getElementById("hp")
    .innerText = hp;

    renderer.render(scene,camera);
}

animate();

</script>

</body>
</html>
